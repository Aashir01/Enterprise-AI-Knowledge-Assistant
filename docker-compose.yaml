version: "3.9"

services:
  # ──────────────────────────────────────────────
  # Backend — FastAPI + RAG engine
  # ──────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --workers 1
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Persist FAISS index and logs between restarts
      - ./faiss_index:/app/faiss_index
      - ./logs:/app/logs
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ──────────────────────────────────────────────
  # Frontend — Streamlit UI
  # ──────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      streamlit run frontend/app.py
      --server.port 8501
      --server.address 0.0.0.0
      --server.headless true
      --browser.gatherUsageStats false
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://backend:8000   # Internal Docker network URL
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # Qdrant — optional cloud-scale vector store
  # Uncomment this service when VECTOR_STORE=qdrant
  # ──────────────────────────────────────────────
  # qdrant:
  #   image: qdrant/qdrant:latest
  #   ports:
  #     - "6333:6333"
  #   volumes:
  #     - qdrant_storage:/qdrant/storage
  #   restart: unless-stopped

